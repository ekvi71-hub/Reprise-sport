<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTracker — J92→14 Juillet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080a0e;
  --s1: #0f1117;
  --s2: #161820;
  --s3: #1e2130;
  --border: #252836;
  --border2: #2e3245;
  --lime: #c8f135;
  --lime-dim: rgba(200,241,53,.12);
  --lime-border: rgba(200,241,53,.25);
  --teal: #35f1c8;
  --teal-dim: rgba(53,241,200,.1);
  --teal-border: rgba(53,241,200,.2);
  --coral: #f17535;
  --coral-dim: rgba(241,117,53,.1);
  --blue: #5b8ef7;
  --blue-dim: rgba(91,142,247,.1);
  --text: #e8eaf0;
  --muted: #5c6278;
  --muted2: #7a80a0;
  --red: #f75b5b;
  --font-head: 'Archivo Black', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--s1); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px; }

/* ─── HEADER ─── */
.app-header {
  position:sticky; top:0; z-index:100;
  background:rgba(8,10,14,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  height:56px;
}
.logo { font-family:var(--font-head); font-size:18px; letter-spacing:-.5px; }
.logo span { color:var(--lime); }
.header-nav { display:flex; gap:6px; }
.hn-btn {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--muted2); font-family:var(--font-body); font-size:12px; font-weight:500;
  padding:6px 12px; cursor:pointer; transition:all .15s; white-space:nowrap;
}
.hn-btn:hover { border-color:var(--lime); color:var(--lime); }
.hn-btn.active { background:var(--lime-dim); border-color:var(--lime-border); color:var(--lime); }

/* ─── VIEWS ─── */
.view { display:none; }
.view.active { display:block; }

/* ─── WEEK TIMELINE ─── */
.timeline-wrap {
  padding:16px 20px 0;
  overflow-x:auto; scrollbar-width:thin;
  background:var(--s1);
  border-bottom:1px solid var(--border);
}
.timeline {
  display:flex; gap:6px;
  min-width:max-content;
  padding-bottom:14px;
}
.wk-pill {
  display:flex; flex-direction:column; align-items:center;
  background:var(--s2); border:1px solid var(--border); border-radius:12px;
  padding:8px 14px; cursor:pointer; transition:all .2s;
  min-width:80px; position:relative;
}
.wk-pill:hover { border-color:var(--border2); }
.wk-pill.active { border-color:var(--lime); background:var(--lime-dim); }
.wk-pill.has-data::after {
  content:''; position:absolute; top:6px; right:8px;
  width:6px; height:6px; border-radius:50%; background:var(--teal);
}
.wk-num { font-family:var(--font-mono); font-size:10px; color:var(--muted); font-weight:600; }
.wk-dates { font-size:10px; color:var(--muted2); margin-top:2px; }
.wk-label { font-family:var(--font-head); font-size:11px; margin-top:4px; color:var(--text); }
.wk-pill.active .wk-label { color:var(--lime); }
.wk-progress {
  width:100%; height:3px; background:var(--border); border-radius:2px; margin-top:6px; overflow:hidden;
}
.wk-progress-bar { height:100%; background:var(--lime); border-radius:2px; transition:width .4s; }

/* ─── DAY STRIP ─── */
.day-strip {
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
  padding:14px 20px;
  background:var(--s1); border-bottom:1px solid var(--border);
}
.ds-day {
  background:var(--s2); border:1px solid var(--border); border-radius:10px;
  padding:8px 4px; text-align:center; cursor:pointer; transition:all .2s;
}
.ds-day:hover { border-color:var(--border2); }
.ds-day.active { border-color:var(--lime); background:var(--lime-dim); }
.ds-day.rest-day.active { border-color:var(--teal); background:var(--teal-dim); }
.ds-day.full-rest.active { border-color:var(--muted); background:rgba(92,98,120,.1); }
.ds-day.has-log { position:relative; }
.ds-day.has-log::after { content:''; position:absolute; top:5px; right:6px; width:5px; height:5px; border-radius:50%; background:var(--teal); }
.ds-lbl { font-size:9px; font-weight:600; color:var(--muted); letter-spacing:.5px; }
.ds-icon { font-size:15px; margin:3px 0; }
.ds-type { font-size:8px; font-weight:700; }
.ds-day.active .ds-type { color:var(--lime); }
.ds-day.rest-day.active .ds-type { color:var(--teal); }
.ds-day.full-rest.active .ds-type { color:var(--muted2); }
.ds-day .ds-type { color:var(--muted); }

/* ─── MAIN CONTENT ─── */
.main { max-width:900px; margin:0 auto; padding:20px 20px 80px; }

/* ─── SESSION HEADER ─── */
.session-hd {
  display:flex; align-items:center; gap:14px; margin-bottom:16px;
}
.s-badge {
  font-family:var(--font-head); font-size:14px;
  width:46px; height:46px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.sb-sport { background:var(--lime); color:#080a0e; }
.sb-rest { background:var(--teal); color:#080a0e; }
.sb-full { background:var(--s3); color:var(--muted2); border:1px solid var(--border); }
.s-title { font-family:var(--font-head); font-size:18px; letter-spacing:-.3px; }
.s-sub { color:var(--muted2); font-size:12px; margin-top:3px; }

/* ─── TIMING CHIPS ─── */
.timing-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
.t-chip {
  background:var(--s2); border:1px solid var(--border); border-radius:8px;
  padding:7px 13px; font-size:12px; display:flex; align-items:center; gap:8px;
}
.t-chip .tc-lbl { color:var(--muted); font-size:10px; display:block; }
.t-chip .tc-val { font-family:var(--font-mono); font-weight:600; font-size:12px; }

/* ─── EXERCISE CARD ─── */
.ex-card {
  background:var(--s2); border:1px solid var(--border); border-radius:14px;
  margin-bottom:10px; overflow:hidden; transition:border-color .2s;
}
.ex-card.open { border-color:var(--lime); }
.ex-top {
  display:grid; grid-template-columns:42px 1fr auto;
  gap:12px; align-items:center; padding:13px 14px; cursor:pointer;
}
.ex-ico { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.ex-name { font-weight:700; font-size:14px; line-height:1.2; }
.ex-muscle { color:var(--muted2); font-size:11px; margin-top:3px; }
.ex-summary { display:flex; align-items:center; gap:8px; }
.ex-chip {
  background:var(--bg); border:1px solid var(--border); border-radius:7px;
  padding:4px 10px; font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--lime); white-space:nowrap;
}
.ex-logged { background:var(--teal-dim); border-color:var(--teal-border); color:var(--teal); }
.chev { color:var(--muted); font-size:13px; transition:transform .2s; cursor:pointer; }
.ex-card.open .chev { transform:rotate(180deg); }

/* ─── EXERCISE BODY ─── */
.ex-body { display:none; border-top:1px solid var(--border); }
.ex-card.open .ex-body { display:block; }

/* SETS TABLE */
.sets-section { padding:14px 14px 8px; }
.sets-section h4 {
  font-family:var(--font-mono); font-size:9px; font-weight:600;
  letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:10px;
}
.set-row {
  display:grid; grid-template-columns:60px 1fr 1fr 110px;
  gap:8px; align-items:center;
  padding:8px 10px; border-radius:8px; margin-bottom:4px;
  background:var(--s3); border:1px solid transparent; transition:border-color .15s;
}
.set-row:hover { border-color:var(--border2); }
.set-row.logged { border-color:var(--teal-border); background:rgba(53,241,200,.05); }
.set-label { font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--muted2); }
.set-reps { font-size:12px; }
.set-reps strong { font-family:var(--font-mono); font-weight:600; color:var(--lime); }
.set-note { font-size:10px; color:var(--muted); line-height:1.3; }
.set-rest { display:inline-flex; align-items:center; gap:5px; }
.rest-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 8px; border-radius:6px; font-family:var(--font-mono); font-size:10px; font-weight:600;
}
.rb-blue { background:var(--blue-dim); border:1px solid rgba(91,142,247,.2); color:var(--blue); }
.rb-end { background:rgba(92,98,120,.1); border:1px solid var(--border); color:var(--muted); }

/* WEIGHT INPUT */
.weight-input-wrap { display:flex; align-items:center; gap:6px; }
.weight-input {
  background:var(--bg); border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-family:var(--font-mono); font-size:13px; font-weight:600;
  width:64px; padding:5px 8px; text-align:center; transition:border-color .15s;
}
.weight-input:focus { outline:none; border-color:var(--lime); }
.weight-input.filled { border-color:var(--teal-border); color:var(--teal); }
.weight-unit { font-size:11px; color:var(--muted); }

@media(max-width:520px){
  .set-row { grid-template-columns:50px 1fr 110px; }
  .set-note { display:none; }
}

/* INTER-EXO REST */
.exo-rest-bar {
  display:flex; align-items:center; gap:10px;
  padding:8px 14px; border-top:1px solid var(--border);
  font-size:12px; color:var(--muted);
}
.erb-val { font-family:var(--font-mono); font-weight:600; color:var(--coral); font-size:13px; }

/* TECHNIQUE */
.technique-section { padding:4px 14px 14px; }
.tech-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
@media(max-width:500px){ .tech-grid { grid-template-columns:1fr; } }
.tech-block { background:var(--bg); border-radius:9px; padding:10px 12px; }
.tech-block h5 { font-family:var(--font-mono); font-size:9px; font-weight:600; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
.tech-block p { font-size:12px; line-height:1.5; color:var(--muted2); }
.muscles-row { display:flex; flex-wrap:wrap; gap:5px; padding:0 14px 10px; }
.mtag { background:var(--lime-dim); border:1px solid var(--lime-border); color:var(--lime); font-size:10px; padding:2px 9px; border-radius:100px; }
.tip-bar { background:var(--teal-dim); border:1px solid var(--teal-border); border-radius:9px; padding:9px 13px; margin:0 14px 14px; font-size:12px; line-height:1.5; color:var(--teal); }

/* SAVE BUTTON */
.save-btn-wrap { padding:0 14px 14px; display:flex; gap:8px; align-items:center; }
.save-btn {
  background:var(--lime); color:#080a0e; border:none; border-radius:9px;
  font-family:var(--font-head); font-size:12px; padding:9px 18px;
  cursor:pointer; transition:all .15s; letter-spacing:.3px;
}
.save-btn:hover { filter:brightness(1.1); }
.save-confirm { font-size:11px; color:var(--teal); opacity:0; transition:opacity .3s; }
.save-confirm.show { opacity:1; }

/* ─── REST DAY ─── */
.rest-section { background:var(--s2); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:12px; }
.rest-section h3 { font-weight:700; font-size:14px; margin-bottom:12px; color:var(--teal); }
.rest-list { list-style:none; }
.rest-list li { padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; display:flex; gap:9px; line-height:1.4; }
.rest-list li:last-child { border-bottom:none; }

/* ─── PROGRESS VIEW ─── */
.progress-view { max-width:900px; margin:0 auto; padding:20px 20px 80px; }
.pv-title { font-family:var(--font-head); font-size:24px; letter-spacing:-.5px; margin-bottom:6px; }
.pv-sub { color:var(--muted2); font-size:13px; margin-bottom:24px; }

.exercise-select-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:8px; margin-bottom:24px;
}
.exo-select-card {
  background:var(--s2); border:1px solid var(--border); border-radius:11px;
  padding:12px 14px; cursor:pointer; transition:all .2s;
}
.exo-select-card:hover { border-color:var(--border2); }
.exo-select-card.selected { border-color:var(--lime); background:var(--lime-dim); }
.esc-icon { font-size:20px; margin-bottom:6px; }
.esc-name { font-weight:600; font-size:13px; line-height:1.2; }
.esc-day { color:var(--muted); font-size:10px; margin-top:3px; }

.chart-container {
  background:var(--s2); border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:16px;
}
.chart-title { font-weight:700; font-size:15px; margin-bottom:4px; }
.chart-sub { color:var(--muted2); font-size:12px; margin-bottom:16px; }
.chart-wrap { position:relative; height:220px; }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
.stat-box { background:var(--bg); border-radius:9px; padding:12px 14px; text-align:center; }
.stat-val { font-family:var(--font-mono); font-size:20px; font-weight:600; color:var(--lime); }
.stat-lbl { font-size:10px; color:var(--muted); margin-top:3px; }

.no-data {
  text-align:center; padding:48px 20px; color:var(--muted);
  background:var(--s2); border:1px solid var(--border); border-radius:14px;
}
.no-data .nd-icon { font-size:36px; margin-bottom:10px; }
.no-data p { font-size:13px; line-height:1.5; }

/* ─── GLOBAL BANNER ─── */
.banner { border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:13px; line-height:1.5; display:flex; gap:9px; }
.bn-green { background:var(--teal-dim); border:1px solid var(--teal-border); color:var(--teal); }
.bn-orange { background:var(--coral-dim); border:1px solid rgba(241,117,53,.2); color:var(--coral); }

/* ─── WEEK SUMMARY BAR ─── */
.week-summary {
  display:flex; gap:8px; flex-wrap:wrap;
  padding:10px 20px; background:var(--s1); border-bottom:1px solid var(--border);
}
.ws-chip {
  background:var(--s2); border:1px solid var(--border); border-radius:8px;
  padding:5px 12px; font-size:11px; display:flex; gap:6px; align-items:center;
}
.ws-chip .wsc-v { font-family:var(--font-mono); font-weight:600; color:var(--lime); }
.ws-chip .wsc-l { color:var(--muted); }

/* ─── TOASTER ─── */
.toaster {
  position:fixed; bottom:24px; right:24px; z-index:999;
  background:var(--teal); color:#080a0e;
  font-family:var(--font-head); font-size:13px; padding:10px 18px; border-radius:10px;
  transform:translateY(80px); opacity:0; transition:all .3s;
}
.toaster.show { transform:translateY(0); opacity:1; }

@media(max-width:480px){
  .app-header { height:48px; }
  .logo { font-size:15px; }
  .hn-btn { font-size:11px; padding:5px 9px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">FIT<span>TRACK</span></div>
  <div class="header-nav">
    <button class="hn-btn active" id="btn-session" onclick="showView('session')">🏋️ Séance</button>
    <button class="hn-btn" id="btn-progress" onclick="showView('progress')">📈 Progression</button>
  </div>
</header>

<!-- ═══ SESSION VIEW ═══ -->
<div class="view active" id="view-session">

  <div class="timeline-wrap">
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="week-summary" id="week-summary"></div>

  <div class="day-strip" id="day-strip"></div>

  <div class="main" id="session-main"></div>

</div>

<!-- ═══ PROGRESS VIEW ═══ -->
<div class="view" id="view-progress">
  <div class="progress-view">
    <div class="pv-title">Progression 📈</div>
    <div class="pv-sub">Sélectionne un exercice pour voir l'évolution de tes charges</div>
    <div class="exercise-select-grid" id="exo-select-grid"></div>
    <div id="chart-area"></div>
  </div>
</div>

<div class="toaster" id="toaster">✓ Poids sauvegardés !</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════

const WEEKS = [];
const START = new Date(2026,3,21); // 21 avril 2026
const END   = new Date(2026,6,14); // 14 juillet 2026

function fmt(d) {
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }

let wkIdx = 0;
let cur = new Date(START);
while (cur <= END) {
  wkIdx++;
  const mon = new Date(cur);
  const sun = addDays(cur,6);
  WEEKS.push({ idx:wkIdx, start:new Date(mon), end:new Date(sun), label:`S${wkIdx}` });
  cur = addDays(cur,7);
}

// Day types per week (Mon=0..Sun=6)
const DAY_PLAN = [
  { type:'sport', label:'Haut A', icon:'💪', session:'hautA' },
  { type:'sport', label:'Bas A',  icon:'🦵', session:'basA' },
  { type:'rest',  label:'Repos+', icon:'🚶', session:'rest1' },
  { type:'sport', label:'Haut B', icon:'💪', session:'hautB' },
  { type:'sport', label:'Bas B',  icon:'🦵', session:'basB' },
  { type:'rest',  label:'Repos+', icon:'🚶', session:'rest2' },
  { type:'full',  label:'Repos',  icon:'😴', session:'restFull' },
];

// ── EXERCISES ──
const EXERCISES = {
  hautA: {
    title:'Haut du corps A — Poussé + Épaules',
    totalTime:'~35 min',
    banner:{cls:'bn-green', text:'✅ <strong>Haut A</strong> — Poussé, épaules, triceps, gainage'},
    list:[
      { id:'deve_halt', name:'Développé haltères', icon:'🏋️', color:'rgba(200,241,53,.12)',
        muscles:['Pectoraux','Triceps','Deltoïde antérieur'],
        sets:[{n:1,reps:'12',note:'S1 léger — calibrer la charge',rest:75},{n:2,reps:'11',note:'Maintenir la forme',rest:75},{n:3,reps:'10',note:'Descente 3s / montée 1s',rest:null}],
        restAfter:100,
        pos:'Allongé sur le banc, dos plat, pieds au sol. Haltères à hauteur des épaules.',
        exec:'Coudes à 45°. Poussez en extension presque complète. Redescendez lentement 2–3s.',
        err:'Coudes pas à 90°. Omoplates serrées. Ne verrouillez pas les coudes.',
        tip:'Si S3 trop facile, +2 kg la semaine suivante.'
      },
      { id:'deve_epa', name:'Développé épaules', icon:'⬆️', color:'rgba(241,117,53,.12)',
        muscles:['Deltoïde ant.','Deltoïde lat.','Triceps'],
        sets:[{n:1,reps:'12',note:'Dos droit, ne pas cambrer',rest:75},{n:2,reps:'11',note:'Coudes légèrement devant',rest:75},{n:3,reps:'10',note:'Contrôler la descente',rest:null}],
        restAfter:100,
        pos:'Assis banc, dos droit. Haltères à hauteur épaules, paumes vers l\'avant.',
        exec:'Poussez jusqu\'à presque rejoindre les haltères en haut. Redescendez à hauteur d\'oreilles.',
        err:'Ne creusez pas les lombaires. Ne descendez pas sous les épaules.',
        tip:'Rotation des poignets vers l\'avant (Arnold press) pour protéger les épaules.'
      },
      { id:'elev_lat', name:'Élévations latérales', icon:'🦅', color:'rgba(53,241,200,.12)',
        muscles:['Deltoïde latéral'],
        sets:[{n:1,reps:'12',note:'Poids très léger — technique avant tout',rest:60},{n:2,reps:'12',note:'Descente 3s minimum',rest:60},{n:3,reps:'12',note:'Brûlement = bon signe !',rest:null}],
        restAfter:100,
        pos:'Debout, haltères légers, légère flexion du coude.',
        exec:'Levez latéralement jusqu\'à hauteur épaules. Pouce légèrement vers le bas. Descente lente 3s.',
        err:'Pas au-dessus de l\'horizontal. Pas d\'élan.',
        tip:'3–5 kg suffisent. Qualité > charge sur cet exercice.'
      },
      { id:'ext_tri', name:'Extension triceps', icon:'🔼', color:'rgba(200,241,53,.12)',
        muscles:['Triceps brachial'],
        sets:[{n:1,reps:'12',note:'Coudes proches des oreilles',rest:60},{n:2,reps:'12',note:'Extension complète en haut',rest:60},{n:3,reps:'12',note:'Contrôler la descente',rest:null}],

  EXERCISES[sk].list.forEach(e => { if(!ALL_EXOS.find(x=>x.id===e.id)) ALL_EXOS.push({id:e.id,name:e.name,icon:e.icon,session:sk}); });

// STATE
// ═══════════════════════════════════════
let currentWeek = 0;  // index into WEEKS
let currentDay  = 0;  // 0=Mon..6=Sun

// STORAGE
function storageKey(weekIdx, dayIdx, exoId, setN) {
  return `ft_w${weekIdx}_d${dayIdx}_${exoId}_s${setN}`;
}
function saveWeight(weekIdx, dayIdx, exoId, setN, val) {
  localStorage.setItem(storageKey(weekIdx,dayIdx,exoId,setN), val);
}
function loadWeight(weekIdx, dayIdx, exoId, setN) {
  return localStorage.getItem(storageKey(weekIdx,dayIdx,exoId,setN)) || '';
}
function hasAnyDataForDay(weekIdx, dayIdx) {
  const plan = DAY_PLAN[dayIdx];
  if (!EXERCISES[plan.session]) return false;
  for (const ex of EXERCISES[plan.session].list) {
    for (const s of ex.sets) {
      if (loadWeight(weekIdx, dayIdx, ex.id, s.n)) return true;
    }
  }
  return false;
}
function hasAnyDataForWeek(weekIdx) {
  for (let d=0;d<7;d++) if(hasAnyDataForDay(weekIdx,d)) return true;
  return false;
}
function countFilledSetsInWeek(weekIdx) {
  let total=0, filled=0;
  for(let d=0;d<7;d++){
    const plan=DAY_PLAN[d];
    if(!EXERCISES[plan.session]) continue;
    for(const ex of EXERCISES[plan.session].list){
      for(const s of ex.sets){
        total++;
        if(loadWeight(weekIdx,d,ex.id,s.n)) filled++;
      }
    }
  }
  return {total, filled};
}

// ═══════════════════════════════════════
// TIMELINE BUILD
// ═══════════════════════════════════════
function buildTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = WEEKS.map((w,i) => {
    const {total,filled} = countFilledSetsInWeek(i);
    const pct = total ? Math.round(filled/total*100) : 0;
    const hasDat = filled > 0;
    return `<div class="wk-pill${i===currentWeek?' active':''}${hasDat?' has-data':''}" onclick="selectWeek(${i})">
      <div class="wk-num">${w.label}</div>
      <div class="wk-dates">${fmt(w.start)}</div>
      <div class="wk-label">${fmt(w.start).slice(0,2)}/${fmt(w.end).slice(0,2)}</div>
      <div class="wk-progress"><div class="wk-progress-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  // Scroll active into view
  setTimeout(()=>{
    const active = el.querySelector('.wk-pill.active');
    if(active) active.scrollIntoView({inline:'center', behavior:'smooth'});
  },50);
}

function buildWeekSummary() {
  const w = WEEKS[currentWeek];
  const {total,filled} = countFilledSetsInWeek(currentWeek);
  const pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById('week-summary').innerHTML = `
    <div class="ws-chip"><span class="wsc-l">Semaine</span><span class="wsc-v">${w.label}</span></div>
    <div class="ws-chip"><span class="wsc-l">Dates</span><span class="wsc-v">${fmt(w.start)} → ${fmt(w.end)}</span></div>
    <div class="ws-chip"><span class="wsc-l">Séries complétées</span><span class="wsc-v">${filled}/${total}</span></div>
    <div class="ws-chip"><span class="wsc-l">Progression semaine</span><span class="wsc-v">${pct}%</span></div>
  `;
}

// ═══════════════════════════════════════
// DAY STRIP
// ═══════════════════════════════════════
function buildDayStrip() {
  const w = WEEKS[currentWeek];
  document.getElementById('day-strip').innerHTML = DAY_PLAN.map((p,i) => {
    const date = addDays(w.start, i);
    const isActive = i === currentDay;
    const hasLog = hasAnyDataForDay(currentWeek, i);
    const cls = p.type==='rest'?'rest-day':p.type==='full'?'full-rest':'sport-day';
    const activeCls = isActive ? (p.type==='rest'?'rest-day':(p.type==='full'?'full-rest':'active')) : '';
    return `<div class="ds-day ${cls} ${activeCls} ${hasLog?'has-log':''}" onclick="selectDay(${i})">
      <div class="ds-lbl">${['LUN','MAR','MER','JEU','VEN','SAM','DIM'][i]}</div>
      <div class="ds-lbl" style="font-size:8px;margin-top:1px">${fmt(date)}</div>
      <div class="ds-icon">${p.icon}</div>
      <div class="ds-type">${p.label}</div>
    </div>`;
  }).join('');
}

            <div class="tech-block" style="grid-column:1/-1"><h5>⚠️ Erreurs</h5><p>${ex.err}</p></div>
          </div>
        </div>
        <div class="tip-bar">💡 ${ex.tip}</div>
        <div class="save-btn-wrap">
          <button class="save-btn" onclick="saveExo(${ei})">💾 Sauvegarder</button>
          <span class="save-confirm" id="sc-${ei}">✓ Sauvegardé !</span>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════
function selectWeek(i) {
  currentWeek = i;
  currentDay = 0;
  buildTimeline();
  buildWeekSummary();
  buildDayStrip();
  buildSession();
}

function selectDay(i) {
  currentDay = i;
  buildDayStrip();
  buildSession();
}

function toggleEx(id) {
  document.getElementById(id).classList.toggle('open');
}

function onWeightInput(ei, setN, inp) {
  const val = inp.value;
  inp.classList.toggle('filled', !!val);
  const row = document.getElementById(`setrow-${ei}-${setN}`);
  if(row) row.classList.toggle('logged', !!val);
}

function saveExo(ei) {
  const plan = DAY_PLAN[currentDay];
  const sess = EXERCISES[plan.session];
  const ex = sess.list[ei];
  ex.sets.forEach(s => {
    const inp = document.getElementById(`w-${ei}-${s.n}`);
    if(inp) saveWeight(currentWeek, currentDay, ex.id, s.n, inp.value);
  });
  // Update chip
  const allFilled = ex.sets.every(s => loadWeight(currentWeek, currentDay, ex.id, s.n));
  const chip = document.querySelector(`#excard-${ei} .ex-chip`);
  if(chip) { chip.textContent = allFilled ? '✓ Logué' : ex.sets[0].reps+' rép'; chip.classList.toggle('ex-logged',allFilled); }
  // Confirm
  const sc = document.getElementById(`sc-${ei}`);
  if(sc){ sc.classList.add('show'); setTimeout(()=>sc.classList.remove('show'),2000); }
  // Toast
  showToast('💾 Poids sauvegardés !');
  // Update timeline + summary
  buildTimeline();
  buildWeekSummary();
  buildDayStrip();
}

function showToast(msg) {
  const t = document.getElementById('toaster');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════
// PROGRESS VIEW
// ═══════════════════════════════════════
let selectedExoId = null;
let chart = null;

function showView(v) {
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.hn-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('btn-'+v).classList.add('active');
  if(v==='progress') buildProgressView();
}

function buildProgressView() {
  // Exercise selector
  const grid = document.getElementById('exo-select-grid');
  const sessLabels = { hautA:'Haut A (Lun)', basA:'Bas A (Mar)', hautB:'Haut B (Jeu)', basB:'Bas B (Ven)' };
  grid.innerHTML = ALL_EXOS.map(e => `
    <div class="exo-select-card ${selectedExoId===e.id?'selected':''}" onclick="selectExo('${e.id}')">
      <div class="esc-icon">${e.icon}</div>
      <div class="esc-name">${e.name}</div>
      <div class="esc-day">${sessLabels[e.session]}</div>
    </div>`).join('');
  renderChart();
}

function selectExo(id) {
  selectedExoId = id;
  buildProgressView();
}

function renderChart() {
  const area = document.getElementById('chart-area');
  if(!selectedExoId){ area.innerHTML = `<div class="no-data"><div class="nd-icon">👆</div><p>Sélectionne un exercice ci-dessus<br>pour voir ta progression</p></div>`; return; }

  // Find exercise
  let exo=null, sessKey=null;
  for(const sk of ['hautA','basA','hautB','basB']){
    const f = EXERCISES[sk].list.find(e=>e.id===selectedExoId);
    if(f){ exo=f; sessKey=sk; break; }
  }
  if(!exo){ area.innerHTML=''; return; }

  // Find day index for this session
  const dayIdx = DAY_PLAN.findIndex(p=>p.session===sessKey);

  // Collect data per week
  const labels=[], maxWeights=[], avgWeights=[], setData=[1,2,3].map(()=>[]);

  WEEKS.forEach((w,wi)=>{
    const d = addDays(w.start, dayIdx);
    const dateStr = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    labels.push(dateStr);
    const vals = exo.sets.map(s=>{
      const v = parseFloat(loadWeight(wi,dayIdx,exo.id,s.n));
      return isNaN(v)?null:v;
    });
    const filled = vals.filter(v=>v!==null);
    maxWeights.push(filled.length ? Math.max(...filled) : null);
    avgWeights.push(filled.length ? Math.round(filled.reduce((a,b)=>a+b,0)/filled.length*10)/10 : null);
    exo.sets.forEach((s,si)=>{ setData[si].push(vals[si]); });
  });

  // Stats
  const allMax = maxWeights.filter(v=>v!==null);
  const pb = allMax.length ? Math.max(...allMax) : 0;
  const lastFilled = [...maxWeights].reverse().find(v=>v!==null);
  const loggedWeeks = maxWeights.filter(v=>v!==null).length;

  area.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">${exo.icon} ${exo.name}</div>
      <div class="chart-sub">Évolution du poids max par séance sur ${WEEKS.length} semaines</div>
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val">${pb || '—'}<span style="font-size:12px"> kg</span></div><div class="stat-lbl">Record (PB)</div></div>
        <div class="stat-box"><div class="stat-val">${lastFilled || '—'}<span style="font-size:12px"> kg</span></div><div class="stat-lbl">Dernière séance</div></div>
        <div class="stat-box"><div class="stat-val">${loggedWeeks}</div><div class="stat-lbl">Semaines loguées</div></div>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Détail par série</div>
      <div class="chart-sub">Poids utilisé pour chaque série sur la durée</div>
      <div class="chart-wrap"><canvas id="myChart2"></canvas></div>
    </div>
  `;

  const colors = ['#c8f135','#35f1c8','#f17535'];

  // Chart 1 — max weight
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('myChart'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'Poids max (kg)',
        data: maxWeights,
        borderColor:'#c8f135', backgroundColor:'rgba(200,241,53,.1)',
        borderWidth:2, pointRadius:4, pointBackgroundColor:'#c8f135',
        fill:true, tension:.3, spanGaps:true
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#7a80a0', font:{family:'Space Grotesk',size:11} } } },
      scales:{
        x:{ ticks:{color:'#5c6278', font:{size:10}}, grid:{color:'#1e2130'} },
        y:{ ticks:{color:'#5c6278', font:{size:10}}, grid:{color:'#1e2130'}, beginAtZero:false }
      }
    }
  });

  // Chart 2 — per set
  new Chart(document.getElementById('myChart2'), {
    type:'line',
    data:{
      labels,
      datasets: exo.sets.map((s,i) => ({
        label:`Série ${s.n}`,
        data: setData[i],
        borderColor: colors[i], backgroundColor: colors[i]+'22',
        borderWidth:2, pointRadius:3, fill:false, tension:.3, spanGaps:true
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#7a80a0', font:{family:'Space Grotesk',size:11} } } },
      scales:{
        x:{ ticks:{color:'#5c6278', font:{size:10}}, grid:{color:'#1e2130'} },
        y:{ ticks:{color:'#5c6278', font:{size:10}}, grid:{color:'#1e2130'}, beginAtZero:false }
      }
    }
  });
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
(function init(){
  // Set current week to today if within range
  const today = new Date();
  today.setHours(0,0,0,0);
  WEEKS.forEach((w,i)=>{
    const s=new Date(w.start); s.setHours(0,0,0,0);
    const e=new Date(w.end); e.setHours(0,0,0,0);
    if(today>=s && today<=e){ currentWeek=i; }
  });
  // Set current day
  const dow = new Date().getDay(); // 0=Sun..6=Sat
  // Mon=0, Tue=1... => JS: Mon=1,Tue=2..Sun=0
  const dayMap = {1:0,2:1,3:2,4:3,5:4,6:5,0:6};
  if(dayMap[dow]!==undefined) currentDay = dayMap[dow];

  buildTimeline();
  buildWeekSummary();
  buildDayStrip();
  buildSession();
})();
</script>
</body>
